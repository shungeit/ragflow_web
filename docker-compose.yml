version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: ragflow_admin_mysql
    restart: always
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
      --init-connect='SET NAMES utf8mb4'
      --max_connections=200
      --innodb_buffer_pool_size=128M
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ragflow_root_2024
      MYSQL_DATABASE: ragflow_admin
      MYSQL_USER: ragflow_user
      MYSQL_PASSWORD: ragflow_pass_2024
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
    networks:
      - ragflow_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pragflow_root_2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragflow_admin_backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ragflow_admin?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ragflow_user
      SPRING_DATASOURCE_PASSWORD: ragflow_pass_2024
      TZ: Asia/Shanghai
      JWT_SECRET: ${JWT_SECRET:-ragflow_admin_jwt_secret_2024}
      RAGFLOW_BASE_URL: http://159.138.146.41
      RAGFLOW_API_KEY: ragflow-q6dOyf9Pn-K1cWii4aGLsy832oyjoecED1YpsQGtbKA
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ragflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ragflow_admin_frontend
    restart: always
    environment:
      TZ: Asia/Shanghai
    ports:
      - "10081:80"
      - "10443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ragflow_net

volumes:
  mysql_data:

networks:
  ragflow_net:
    driver: bridge
