charset utf-8;

# Security headers
add_header X-Frame-Options           "DENY"              always;
add_header X-Content-Type-Options    "nosniff"           always;
add_header X-XSS-Protection          "1; mode=block"     always;
add_header Referrer-Policy           "strict-origin"     always;
server_tokens off;

set $real_proto $scheme;
if ($http_x_forwarded_proto = "https") {
    set $real_proto "https";
}

root /usr/share/nginx/html;
index index.html;

# ---------- Gzip ----------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_buffers 16 8k;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/x-javascript
    application/xml+rss image/svg+xml;

# ---------- Static asset caching ----------
location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# ---------- Frontend history routing ----------
location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
}

# ---------- SSE streaming (no buffering) ----------
location /api/chat/completions {
    limit_req zone=api burst=20 nodelay;
    proxy_pass         http://backend:8080/api/chat/completions;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $real_proto;
    proxy_buffering    off;
    proxy_cache        off;
    chunked_transfer_encoding on;
    proxy_connect_timeout 10s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    client_max_body_size  50m;
}

# ---------- Backend API proxy ----------
location /api/ {
    limit_req zone=api burst=60 nodelay;
    proxy_pass         http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $real_proto;
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;
    client_max_body_size  50m;
}
